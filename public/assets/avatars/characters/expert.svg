<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <radialGradient id="bgGradient" cx="50%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#8B4513;stop-opacity:0.1"/>
      <stop offset="50%" style="stop-color:#DAA520;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:0.3"/>
    </radialGradient>
    <linearGradient id="robeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B4513"/>
      <stop offset="50%" style="stop-color:#A0522D"/>
      <stop offset="100%" style="stop-color:#654321"/>
    </linearGradient>
    <linearGradient id="scrollGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F5DC"/>
      <stop offset="50%" style="stop-color:#F0E68C"/>
      <stop offset="100%" style="stop-color:#DAA520"/>
    </linearGradient>
    <linearGradient id="globeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#FFA500"/>
      <stop offset="100%" style="stop-color:#FF8C00"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" fill="url(#bgGradient)"/>
  
  <!-- Mystical globe in background -->
  <g transform="translate(256, 100)" opacity="0.6">
    <circle cx="0" cy="0" r="60" fill="url(#globeGradient)" opacity="0.3"/>
    <g stroke="#FFD700" stroke-width="1" fill="none">
      <!-- Grid lines on globe -->
      <circle cx="0" cy="0" r="60"/>
      <circle cx="0" cy="0" r="40"/>
      <circle cx="0" cy="0" r="20"/>
      <line x1="-60" y1="0" x2="60" y2="0"/>
      <line x1="0" y1="-60" x2="0" y2="60"/>
      <line x1="-42" y1="-42" x2="42" y2="42"/>
      <line x1="42" y1="-42" x2="-42" y2="42"/>
    </g>
    <!-- Connection points on globe -->
    <circle cx="-30" cy="-30" r="2" fill="#FFD700"/>
    <circle cx="30" cy="-30" r="2" fill="#FFD700"/>
    <circle cx="-30" cy="30" r="2" fill="#FFD700"/>
    <circle cx="30" cy="30" r="2" fill="#FFD700"/>
    <circle cx="0" cy="0" r="3" fill="#FFD700"/>
  </g>
  
  <!-- Silhouette figures around -->
  <g fill="#8B4513" opacity="0.4">
    <!-- Figure 1 - top left -->
    <circle cx="120" cy="120" r="15" fill="#8B4513"/>
    <rect x="115" y="135" width="10" height="20" fill="#8B4513"/>
    <rect x="110" y="140" width="20" height="5" fill="#8B4513"/>
    
    <!-- Figure 2 - top right -->
    <circle cx="380" cy="120" r="15" fill="#8B4513"/>
    <rect x="375" y="135" width="10" height="20" fill="#8B4513"/>
    <rect x="370" y="140" width="20" height="5" fill="#8B4513"/>
    
    <!-- Figure 3 - bottom left -->
    <circle cx="120" cy="350" r="15" fill="#8B4513"/>
    <rect x="115" y="365" width="10" height="20" fill="#8B4513"/>
    <rect x="110" y="370" width="20" height="5" fill="#8B4513"/>
    
    <!-- Figure 4 - bottom right -->
    <circle cx="380" cy="350" r="15" fill="#8B4513"/>
    <rect x="375" y="365" width="10" height="20" fill="#8B4513"/>
    <rect x="370" y="370" width="20" height="5" fill="#8B4513"/>
    
    <!-- Figure 5 - left center -->
    <circle cx="80" cy="250" r="12" fill="#8B4513"/>
    <rect x="76" y="262" width="8" height="15" fill="#8B4513"/>
    <rect x="72" y="265" width="16" height="4" fill="#8B4513"/>
    
    <!-- Figure 6 - right center -->
    <circle cx="420" cy="250" r="12" fill="#8B4513"/>
    <rect x="416" y="262" width="8" height="15" fill="#8B4513"/>
    <rect x="412" y="265" width="16" height="4" fill="#8B4513"/>
  </g>
  
  <!-- Main figure - Expert -->
  <!-- Robe -->
  <path d="M200 250 Q256 220 312 250 L320 450 Q256 480 192 450 Z" fill="url(#robeGradient)"/>
  
  <!-- Head -->
  <circle cx="256" cy="200" r="40" fill="#F4C2A1"/>
  
  <!-- Long white hair and beard -->
  <path d="M220 180 Q256 140 292 180 Q290 200 256 190 Q222 200 220 180" fill="#FFFFFF"/>
  <path d="M240 200 Q256 220 272 200 Q270 240 256 230 Q242 240 240 200" fill="#FFFFFF"/>
  
  <!-- Glowing eyes -->
  <circle cx="248" cy="195" r="4" fill="#FFD700"/>
  <circle cx="264" cy="195" r="4" fill="#FFD700"/>
  <circle cx="248" cy="195" r="2" fill="#FFA500"/>
  <circle cx="264" cy="195" r="2" fill="#FFA500"/>
  
  <!-- Nose -->
  <ellipse cx="256" cy="205" rx="3" ry="6" fill="#F4C2A1"/>
  
  <!-- Mouth -->
  <path d="M248 215 Q256 220 264 215" stroke="#8B4513" stroke-width="2" fill="none"/>
  
  <!-- Arms -->
  <ellipse cx="200" cy="300" rx="25" ry="40" fill="#F4C2A1" transform="rotate(-30 200 300)"/>
  <ellipse cx="312" cy="300" rx="25" ry="40" fill="#F4C2A1" transform="rotate(30 312 300)"/>
  
  <!-- Left hand holding scroll -->
  <ellipse cx="180" cy="330" rx="20" ry="30" fill="#F4C2A1" transform="rotate(-20 180 330)"/>
  
  <!-- Scroll -->
  <rect x="160" y="300" width="40" height="60" fill="url(#scrollGradient)" rx="3" transform="rotate(-20 180 330)"/>
  <rect x="160" y="300" width="40" height="60" stroke="#8B4513" stroke-width="2" fill="none" rx="3" transform="rotate(-20 180 330)"/>
  
  <!-- Scroll roll ends -->
  <ellipse cx="160" cy="300" rx="3" ry="30" fill="#8B4513" transform="rotate(-20 160 300)"/>
  <ellipse cx="200" cy="300" rx="3" ry="30" fill="#8B4513" transform="rotate(-20 200 300)"/>
  
  <!-- Mathematical symbols on scroll -->
  <g stroke="#8B4513" stroke-width="1.5" fill="none" transform="rotate(-20 180 330)">
    <!-- Triangle -->
    <path d="M170 310 L180 300 L190 310 Z"/>
    <!-- Number 7 with dot -->
    <path d="M175 315 L185 315 L180 325"/>
    <circle cx="186" cy="315" r="1" fill="#8B4513"/>
    <!-- Circle -->
    <circle cx="180" cy="330" r="5"/>
    <!-- Pi symbol -->
    <path d="M170 340 L190 340 M175 340 L175 350 M185 340 L185 350"/>
    <!-- Square root -->
    <path d="M170 355 L175 350 L180 355 L185 360"/>
    <!-- Sun/Star symbol -->
    <g transform="translate(180, 365)">
      <circle cx="0" cy="0" r="3"/>
      <line x1="-6" y1="0" x2="6" y2="0"/>
      <line x1="0" y1="-6" x2="0" y2="6"/>
      <line x1="-4" y1="-4" x2="4" y2="4"/>
      <line x1="4" y1="-4" x2="-4" y2="4"/>
    </g>
    <!-- Wavy lines (water/energy) -->
    <path d="M170 375 Q175 370 180 375 Q185 380 190 375"/>
    <path d="M170 380 Q175 375 180 380 Q185 385 190 380"/>
    <path d="M170 385 Q175 380 180 385 Q185 390 190 385"/>
  </g>
  
  <!-- Right hand -->
  <ellipse cx="320" cy="330" rx="20" ry="30" fill="#F4C2A1" transform="rotate(20 320 330)"/>
  
  <!-- Title text -->
  <text x="256" y="480" text-anchor="middle" fill="#8B4513" font-family="Arial, sans-serif" font-size="24" font-weight="bold">Эксперт</text>
  <text x="256" y="500" text-anchor="middle" fill="#DAA520" font-family="Arial, sans-serif" font-size="14">Мудрец знаний</text>
</svg>
