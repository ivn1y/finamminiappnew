<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сброс состояния - Finam Collab</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: #fff;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #fff;
            margin-bottom: 30px;
        }
        button {
            background: #7E2A89;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px;
            width: 100%;
            max-width: 300px;
        }
        button:hover {
            background: #9A3A9A;
        }
        .info {
            background: #1A1A1F;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            text-align: left;
        }
        .url {
            background: #2A2A2F;
            padding: 10px;
            border-radius: 4px;
            font-family: monospace;
            word-break: break-all;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Сброс состояния</h1>
        
        <div class="info">
            <h3>📱 Для мобильного тестирования:</h3>
            <p>Убедитесь, что ваш телефон подключен к той же Wi-Fi сети, что и компьютер.</p>
            <div class="url">http://192.168.1.12:3000</div>
        </div>

        <button onclick="resetState()">🔄 Сбросить состояние приложения</button>
        <button onclick="goToApp()">🚀 Перейти в приложение</button>
        <button onclick="goToProducts()">📦 Перейти к продуктам</button>

        <div class="info">
            <h3>ℹ️ Информация:</h3>
            <p>• Сервер запущен на порту 3000</p>
            <p>• Все страницы работают корректно</p>
            <p>• Навигация между разделами активна</p>
        </div>
    </div>

    <script>
        function resetState() {
            localStorage.clear();
            sessionStorage.clear();
            alert('✅ Состояние приложения сброшено!');
        }

        function goToApp() {
            window.location.href = 'http://192.168.1.12:3000/collab/home';
        }

        function goToProducts() {
            window.location.href = 'http://192.168.1.12:3000/collab/products';
        }
    </script>
</body>
</html>
