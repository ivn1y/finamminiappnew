<!DOCTYPE html>
<html>
<head>
    <title>Reset App State</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; margin: 5px; }
        button:hover { background: #0056b3; }
        .danger { background: #dc3545; }
        .danger:hover { background: #c82333; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 4px; overflow-x: auto; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Reset App State</h1>
        
        <div id="current-state">
            <h3>Current State:</h3>
            <pre id="state-display">Loading...</pre>
        </div>
        
        <div>
            <button onclick="resetState()">Reset to Initial State</button>
            <button onclick="setOnboardingComplete()" class="danger">Set Onboarding Complete</button>
            <button onclick="clearAll()" class="danger">Clear All Storage</button>
        </div>
        
        <div>
            <h3>Quick Actions:</h3>
            <button onclick="goToOnboarding()">Go to Onboarding</button>
            <button onclick="goToHome()">Go to Home</button>
        </div>
    </div>
    
    <script>
        function getCurrentState() {
            const storage = localStorage.getItem('finam-collab-storage');
            if (storage) {
                try {
                    return JSON.parse(storage);
                } catch (e) {
                    return { error: 'Invalid JSON: ' + e.message };
                }
            }
            return null;
        }
        
        function updateDisplay() {
            const state = getCurrentState();
            document.getElementById('state-display').textContent = 
                state ? JSON.stringify(state, null, 2) : 'No state found';
        }
        
        function resetState() {
            const initialState = {
                state: {
                    user: {
                        id: `user_${Date.now()}`,
                        createdAt: new Date().toISOString(),
                        role: 'trader',
                        profile: {},
                        credentials: { phone: '', email: '' },
                        badges: ['explorer'],
                        xp: 100,
                        progressSteps: 0,
                        scannedZones: [],
                        intent7d: '',
                        goalProgress: {
                            current: 0,
                            target: 100,
                            daysLeft: 7,
                            notes: [],
                            milestones: []
                        }
                    },
                    eventMode: true,
                    isOnboardingComplete: false,
                    showAppTour: false,
                    showProfileTour: false,
                    showMapTour: false,
                    showScheduleTour: false,
                    showAssistantTour: false
                },
                version: 0
            };
            
            localStorage.setItem('finam-collab-storage', JSON.stringify(initialState));
            updateDisplay();
            alert('State reset to initial values');
        }
        
        function setOnboardingComplete() {
            const currentState = getCurrentState();
            if (currentState && currentState.state) {
                currentState.state.isOnboardingComplete = true;
                localStorage.setItem('finam-collab-storage', JSON.stringify(currentState));
                updateDisplay();
                alert('Onboarding marked as complete');
            } else {
                alert('No state found to update');
            }
        }
        
        function clearAll() {
            localStorage.removeItem('finam-collab-storage');
            updateDisplay();
            alert('All storage cleared');
        }
        
        function goToOnboarding() {
            window.location.href = '/onboarding';
        }
        
        function goToHome() {
            window.location.href = '/collab/home';
        }
        
        // Update display on load
        updateDisplay();
    </script>
</body>
</html>
