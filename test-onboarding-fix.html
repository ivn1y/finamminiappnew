<!DOCTYPE html>
<html>
<head>
    <title>Test Onboarding Flow</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; margin: 5px; }
        button:hover { background: #0056b3; }
        .danger { background: #dc3545; }
        .danger:hover { background: #c82333; }
        .success { background: #28a745; }
        .success:hover { background: #218838; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 4px; overflow-x: auto; }
        .test-result { margin: 10px 0; padding: 10px; border-radius: 4px; }
        .test-pass { background: #d4edda; border: 1px solid #c3e6cb; color: #155724; }
        .test-fail { background: #f8d7da; border: 1px solid #f5c6cb; color: #721c24; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Test Onboarding Flow Fix</h1>
        
        <div id="current-state">
            <h3>Current State:</h3>
            <pre id="state-display">Loading...</pre>
        </div>
        
        <div>
            <h3>Test Actions:</h3>
            <button onclick="resetToOnboarding()" class="success">Reset to Onboarding State</button>
            <button onclick="setOnboardingComplete()" class="danger">Set Onboarding Complete</button>
            <button onclick="clearAll()" class="danger">Clear All Storage</button>
        </div>
        
        <div>
            <h3>Navigation Tests:</h3>
            <button onclick="testHomePage()">Test Home Page (/)</button>
            <button onclick="testOnboardingPage()">Test Onboarding Page (/onboarding)</button>
            <button onclick="testMainApp()">Test Main App (/collab/home)</button>
        </div>
        
        <div id="test-results">
            <h3>Test Results:</h3>
            <div id="results-container"></div>
        </div>
    </div>
    
    <script>
        function getCurrentState() {
            const storage = localStorage.getItem('finam-collab-storage');
            if (storage) {
                try {
                    return JSON.parse(storage);
                } catch (e) {
                    return { error: 'Invalid JSON: ' + e.message };
                }
            }
            return null;
        }
        
        function updateDisplay() {
            const state = getCurrentState();
            document.getElementById('state-display').textContent = 
                state ? JSON.stringify(state, null, 2) : 'No state found';
        }
        
        function addTestResult(message, passed) {
            const container = document.getElementById('results-container');
            const div = document.createElement('div');
            div.className = `test-result ${passed ? 'test-pass' : 'test-fail'}`;
            div.textContent = `${passed ? '✓' : '✗'} ${message}`;
            container.appendChild(div);
        }
        
        function resetToOnboarding() {
            const initialState = {
                state: {
                    user: {
                        id: `user_${Date.now()}`,
                        createdAt: new Date().toISOString(),
                        role: null,
                        profile: {},
                        credentials: { phone: '', email: '' },
                        badges: ['explorer'],
                        xp: 100,
                        progressSteps: 0,
                        scannedZones: [],
                        intent7d: '',
                        goalProgress: {
                            current: 0,
                            target: 100,
                            daysLeft: 7,
                            notes: [],
                            milestones: []
                        }
                    },
                    eventMode: true,
                    isOnboardingComplete: false,
                    showAppTour: false,
                    showProfileTour: false,
                    showMapTour: false,
                    showScheduleTour: false,
                    showAssistantTour: false
                },
                version: 0
            };
            
            localStorage.setItem('finam-collab-storage', JSON.stringify(initialState));
            updateDisplay();
            addTestResult('State reset to onboarding (isOnboardingComplete: false)', true);
        }
        
        function setOnboardingComplete() {
            const currentState = getCurrentState();
            if (currentState && currentState.state) {
                currentState.state.isOnboardingComplete = true;
                currentState.state.user.role = 'trader';
                localStorage.setItem('finam-collab-storage', JSON.stringify(currentState));
                updateDisplay();
                addTestResult('Onboarding marked as complete (isOnboardingComplete: true)', true);
            } else {
                addTestResult('No state found to update', false);
            }
        }
        
        function clearAll() {
            localStorage.removeItem('finam-collab-storage');
            updateDisplay();
            addTestResult('All storage cleared', true);
        }
        
        function testHomePage() {
            window.open('/', '_blank');
            addTestResult('Opened home page (/) - should redirect to onboarding if not completed', true);
        }
        
        function testOnboardingPage() {
            window.open('/onboarding', '_blank');
            addTestResult('Opened onboarding page (/onboarding)', true);
        }
        
        function testMainApp() {
            window.open('/collab/home', '_blank');
            addTestResult('Opened main app (/collab/home) - should redirect to onboarding if not completed', true);
        }
        
        // Update display on load
        updateDisplay();
        
        // Add initial test result
        addTestResult('Test page loaded. Use "Reset to Onboarding State" to test the fix.', true);
    </script>
</body>
</html>
