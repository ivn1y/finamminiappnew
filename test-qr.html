<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест QR-кода FINAM:STARTUP_ZONE_A</title>
    <script src="https://cdn.rawgit.com/davidshimjs/qrcodejs/gh-pages/qrcode.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 50px;
            background-color: #f4f4f4;
        }
        #qrcode {
            margin-top: 20px;
            padding: 20px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .info {
            margin-top: 20px;
            padding: 15px;
            background-color: #e3f2fd;
            border-radius: 8px;
            text-align: center;
        }
        .code {
            font-family: monospace;
            font-size: 18px;
            font-weight: bold;
            color: #1976d2;
        }
    </style>
</head>
<body>
    <h1>Тест QR-кода для FINAM</h1>
    <div class="info">
        <p>Код для сканирования:</p>
        <div class="code">FINAM:STARTUP_ZONE_A</div>
    </div>
    <div id="qrcode"></div>

    <script>
        var qrcode = new QRCode(document.getElementById("qrcode"), {
            width: 300,
            height: 300,
            colorDark: "#000000",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });

        // Генерируем QR-код с вашим кодом
        qrcode.makeCode("FINAM:STARTUP_ZONE_A");
    </script>
</body>
</html>
